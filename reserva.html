        </ul>

    <main>
        <section>
            <form id="reserva" name="reserva">
                <fieldset>
                    <legend>Detalles de la Reserva</legend>
                    <div class="campos">
                        <label for="mesa">Ubicación:</label>
                        <select id="mesa" name="mesa">
                            <option value="ventana">Ventana</option>
                            <option value="terraza">Terraza</option>
                        </select>
                        <br><br>
                        <label for="personas">Personas:</label>
                        <input type="number" id="personas" name="personas" min="1" max="6">
                        <br><br>
                        <label for="hora">Hora:</label>
                        <input type="time" id="hora" name="hora" required>
                    </div>
                    <button type="submit">Confirmar Reserva</button>
                </fieldset>
            </form>
        </section>
    </main>
    <aside>Tiempo de espera máximo: 15 min.</aside>
    <footer>® Derechos Reservados - Reservas</footer>
</body>
