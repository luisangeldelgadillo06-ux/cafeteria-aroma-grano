    <main>
        <section>
            <form id="pedido" name="pedido" action="personalizar.html">
                <fieldset>
                    <legend>Selecciona tu Pedido</legend>
                    <div class="campos">
                        <label for="cafe">Tipo de Café:</label>
                        <select id="cafe" name="cafe" required>
                            <option value="espresso">Espresso</option>
                            <option value="americano">Americano</option>
                            <option value="latte">Latte</option>
                        </select>
                        <br><br>
                        <label for="cantidad">Cantidad:</label>
                        <input type="number" id="cantidad" name="cantidad" min="1" value="1">
                    </div>
                    <button type="submit">Siguiente: Personalizar</button>
                </fieldset>
            </form>
        </section>
