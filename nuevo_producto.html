    <main>
        <section>
            <form id="nuevo_producto" name="nuevo_producto" action="reserva.html">
                <fieldset>
                    <legend>Dar de Alta Producto</legend>
                    <div class="campos">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej: Muffin" required>
                        <br><br>
                        <label for="tipo">Categoría:</label>
                        <select id="tipo" name="tipo">
                            <option value="cafe">Café</option>
                            <option value="postre">Postre</option>
                        </select>
                        <br><br>
                        <label for="precio">Precio:</label>
                        <input type="number" id="precio" name="precio" step="0.50">
                    </div>
                    <button type="submit">Guardar Producto</button>
                </fieldset>
            </form>
        </section>
    </main>
